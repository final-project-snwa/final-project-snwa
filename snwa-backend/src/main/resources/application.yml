server:
  forward-headers-strategy: framework

spring:
  application:
    name: snwa-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/snwa?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    # driver-class-name은 Spring Boot 3.x에서 자동 감지되므로 생략 가능
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 5


  jpa:
    defer-datasource-initialization: true
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        default_batch_fetch_size: 100
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

  sql:
    init:
      mode: always
      continue-on-error: true

  # aws/s3
  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID}
        secret-key: ${AWS_SECRET_ACCESS_KEY}
      region:
        static: ${AWS_REGION_STATIC}
      s3:
        bucket: ${AWS_S3_BUCKET}
        enabled: true

  #  # aws/s3
  #  cloud:
  #    aws:
  #      credentials:
  #        access-key: ${AWS_ACCESS_KEY_ID}
  #        secret-key: ${AWS_SECRET_ACCESS_KEY}
  #      region:
  #        static: ${AWS_REGION_STATIC}
  #      s3:
  #        bucket: ${AWS_S3_BUCKET}
  #        #enabled: false

  # mail
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}  # 기본값: Gmail, 다른 서비스 사용 시 환경 변수로 변경
    port: ${MAIL_PORT:587}  # 기본값: 587, SSL 사용 시 465
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
            required: true
          ssl:
            enable: ${MAIL_SMTP_SSL_ENABLE:false}  # SSL 사용 시 true (포트 465)
            trust: ${MAIL_SMTP_SSL_TRUST:smtp.gmail.com}  # Gmail SMTP 서버 신뢰
            protocols: TLSv1.2
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

translation:
  deepl:
    api:
      keys: ${DEEPL_API_KEYS}
      base-url: ${DEEPL_API_BASE_URL}
  gemini:
    api:
      keys: ${GEMINI_API_KEYS}
    model: gemini-2.5-flash
    temperature: 0.2

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus # 프로메테우스가 가져갈 수 있게 노출
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name} # snwa-backend라는 이름표를 붙여줌

# JWT 설정
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400  # 24시간 (초 단위)

# 앱 설정
app:
  base-url: ${APP_BASE_URL:http://localhost:70}  # 이메일 인증 링크에 사용할 기본 URL (nginx 포트)

# 토스 (Docker 등에서 키가 없어도 앱 기동 가능, 결제 API는 키 설정 후 사용)
toss:
  secret-key: ${TOSS_SECRET_KEY:}

# 경험치/레벨 시스템 (포인트 시스템)
exp:
  grant:
    attendance-base: 20
    attendance-streak-bonus-per-day: 5
    attendance-streak-bonus-max: 35
    comment-create: 10
    comment-daily-limit: 20
    coin-spend-per-coin: 20   # 코인 1개 사용 시 20 EXP