name: CI/CD Pipeline

on:
  pull_request:
    branches: [ "develop" ]
    types: [ closed ]

jobs:
  build:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'develop'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: snwa
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ./snwa-backend

      - name: Wait for MySQL to be ready
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h127.0.0.1 -P3306 -uroot --silent; then
              exit 0
            fi
            sleep 2
          done
          exit 1
        env:
          MYSQL_PWD: ${{ secrets.MYSQL_ROOT_PASSWORD }}

      - name: Build with Gradle
        working-directory: ./snwa-backend
        run: ./gradlew clean build --no-daemon
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/snwa
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}

      # 빌드된 JAR 파일을 artifact로 업로드
      - name: Upload backend JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: |
            ./snwa-backend/build/libs/*.jar
            !./snwa-backend/build/libs/*-plain.jar          

  # 2. 프론트엔드 빌드
  frontend-build:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'develop'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: snwa-frontend/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: ./snwa-frontend

      - name: Build frontend
        run: npm run build
        working-directory: ./snwa-frontend

  # 3. EC2 Blue-Green 배포
  deploy:
    needs: [build, frontend-build]
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'develop'
    runs-on: ubuntu-latest

    steps:
      - name: Download backend JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: ./backend-jar

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      # 빌드된 JAR를 EC2로 복사
      - name: Copy backend JAR to EC2
        run: scp -o StrictHostKeyChecking=no ./backend-jar/*.jar ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/final-project-snwa/snwa-backend/app.jar

      - name: Deploy to EC2 (Blue-Green)
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST }} << 'EOF'
            cd /home/ec2-user/final-project-snwa

            # EC2 서버의 소스코드를 GitHub 최신 상태와 동기화
            git fetch origin develop  # 원격의 최신 정보를 가져옴
            git checkout develop
            git reset --hard origin/develop   # GitHub의 develop 상태와 서버를 동기화

            if docker ps --format '{{.Names}}' | grep -q snwa-backend-blue; then
              NEW=green
              OLD=blue
              NEW_PORT=8081
            else
              NEW=blue
              OLD=green
              NEW_PORT=8080
            fi
          
            echo "NEW=$NEW (Port:$NEW_PORT), OLD=$OLD"
          
            # 1. 새 컨테이너 빌드 및 실행
            docker compose build snwa-backend-$NEW
            docker compose up -d snwa-backend-$NEW
          
            # 2. 신규 컨테이너가 뜰 때까지 잠시 대기 (Health Check 대용)
            sleep 20
          
            # 3. [핵심] Nginx가 바라보는 변수 파일 수정
            echo "set \$service_url http://snwa-backend-$NEW:$NEW_PORT;" | sudo tee /home/ec2-user/final-project-snwa/nginx/service-url.inc
          
            # 4. Nginx 설정 재로드
            docker exec snwa-nginx nginx -s reload
          
            # 5. 이전 컨테이너 종료
            docker compose stop snwa-backend-$OLD || true
          EOF